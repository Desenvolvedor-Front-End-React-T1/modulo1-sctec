<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tipos de Display</title>

    <style>
        .block {
            display: block;
        }

        .inline {
            display: inline;
        }

        .inline-block {
            display: inline-block;
        }

        .none {
            display: none;
        }

        .grid {
            display: grid;
        }

        .bg-red {
            background-color: red;
        }

        .bg-blue {
            background-color: blue;
        }

        .bg-cyan {
            background-color: cyan;
        }

        .bg-green {
            background-color: green;
        }

        .bg-violet {
            background-color: violet;
        }
    </style>
</head>

<body>
    <div class="block bg-red">
        DISPLAY BLOCK
    </div>

    <div class="inline bg-blue">
        DISPLAY INLINE
    </div>

    <div class="inline-block bg-cyan">
        DISPLAY INLINE-BLOCK
    </div>

    <div class="none bg-green">
        DISPLAY NONE
    </div>

    <div class="grid bg-violet">
        DISPLAY GRID
    </div>
</body>

</html>
