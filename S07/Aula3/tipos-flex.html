<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tipos de Flex</title>
    <style>
        .container {
            display: flex;
            /* gap: 14px; */
            background-color: lightgray;
        }
        .item {
            flex: 1;
            height: 150px;
        }
        .item1 {
            background-color: lightblue;
        }
        .item2 {
            background-color: lightgreen;
        }
        .item3 {
            background-color: lightcoral;
        }

        .item4 {
            flex: 4;
        }
    </style>
</head>
<body>
    <h2>Modelo 2 colunas</h2>
    <div class="container">
        <div class="item item1">Item 1</div>
        <div class="item item2">Item 2</div>
    </div>

    <h2>Modelo 3 colunas</h2>
    <div class="container">
        <div class="item item1">Item 1</div>
        <div class="item item2">Item 2</div>
        <div class="item item3">Item 3</div>
    </div>

      <h2>Modelo 4 colunas</h2>
    <div class="container">
        <div class="item item1">Item 1</div>
        <div class="item item2">Item 2</div>
        <div class="item item3">Item 3</div>
        <div class="item item4">Item 4</div>
    </div>
</body>
</html>
